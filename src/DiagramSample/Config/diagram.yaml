# Sample diagram configuration demonstrating platforms, applications, modules, links, and business processes

platforms:
  - id: platform1
    type: platform
    displayName: "Platform One"
    applications: [ app1, app2 ]

  - id: platform2
    type: platform
    displayName: ""
    applications: [ app3 ]

applications:
  - id: app1
    type: application
    displayName: "Orders App"
    modules: [ mod1, mod2 ]

  - id: app2
    type: application
    displayName: "Proxy App"
    modules: [ mod3 ]

  - id: app3
    type: application
    displayName: "Inventory App"
    modules: []

modules:
  - id: mod1
    type: module
    displayName: "API"

  - id: mod2
    type: module
    displayName: "Worker"

  - id: mod3
    type: module
    displayName: "Proxy Module"

links:
  - id: link1
    from: app1
    to: app3
    displayName: "HTTP"
    kind: http

  - id: link2
    from: app1
    to: app2
    displayName: ""
    kind: internal

  - id: link3
    from: app1
    to: app3
    displayName: "via proxy"
    kind: proxy
    via: [ app2 ]

  - id: link4
    from: mod1
    to: mod2
    displayName: "queue"
    kind: event

businessProcesses:
  - id: bp1
    displayName: "Order Processing"
    color: "#e67e22"
    hiddenByDefault: false
    steps:
      - node: mod1
      - link: link4
      - node: mod2

  - id: bp2
    displayName: "External Inventory Check"
    color: "#3498db"
    hiddenByDefault: true
    steps:
      - node: app1
      - link: link3
      - node: app3
